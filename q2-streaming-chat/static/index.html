<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaming LLM Chat</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171a23;
      --panel-2: #1f2330;
      --accent: #6c8cff;
      --accent-2: #4f6ef7;
      --user: #2b3450;
      --assistant: #1c2030;
      --text: #e6e8ee;
      --muted: #8b90a0;
      --border: #262b39;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    header .model { font-size: 12px; color: var(--muted); margin-top: 2px; }
    header .status { display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      padding: 8px 14px;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover:not(:disabled) { background: #2a3042; border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.5;
      white-space: normal;
      word-wrap: break-word;
      border: 1px solid var(--border);
    }
    .bubble .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .user { align-self: flex-end; background: var(--user); border-bottom-right-radius: 4px; }
    .assistant { align-self: flex-start; background: var(--assistant); border-bottom-left-radius: 4px; }
    .bubble p { margin: 0 0 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble pre {
      background: #0b0d13;
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border);
    }
    .bubble code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 13px; }
    .bubble :not(pre) > code { background: #0b0d13; padding: 1px 5px; border-radius: 4px; }
    .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .empty { color: var(--muted); text-align: center; margin: auto; font-size: 14px; }
    footer { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--panel); }
    .composer { display: flex; gap: 10px; align-items: flex-end; }
    textarea {
      flex: 1;
      resize: none;
      font: inherit;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      max-height: 160px;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    .send { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    .send:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Streaming LLM Chat</h1>
        <div class="model" id="model">connecting…</div>
      </div>
      <div class="status">
        <span class="dot" id="dot"></span>
        <button id="reset" title="Start a fresh conversation">New session</button>
      </div>
    </header>

    <div id="messages">
      <div class="empty" id="empty">Ask anything to start the conversation.</div>
    </div>

    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Type a message…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send" id="send">Send</button>
      </div>
      <div class="hint">Tokens stream live from the local model via Server-Sent Events.</div>
    </footer>
  </div>

  <script>
    const SESSION_ID = "default";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const resetBtn = document.getElementById("reset");
    const emptyEl = document.getElementById("empty");
    const modelEl = document.getElementById("model");
    const dotEl = document.getElementById("dot");

    let streaming = false;

    // --- Minimal, safe Markdown renderer (escape first, then format). ---
    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function renderMarkdown(text) {
      let html = escapeHtml(text);
      // fenced code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code>${code.replace(/\n$/, "")}</code></pre>`);
      // inline code
      html = html.replace(/`([^`\n]+)`/g, "<code>$1</code>");
      // bold / italic
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
      // headings
      html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.*)$/gm, "<h2>$1</h2>");
      // paragraphs (split on blank lines, leave block elements intact)
      return html.split(/\n{2,}/).map(block => {
        if (/^\s*<(pre|h2|h3|ul|ol|li)/.test(block)) return block;
        return "<p>" + block.replace(/\n/g, "<br>") + "</p>";
      }).join("");
    }

    function clearEmpty() { if (emptyEl) emptyEl.style.display = "none"; }

    function addBubble(role, text) {
      clearEmpty();
      const bubble = document.createElement("div");
      bubble.className = "bubble " + role;
      const label = document.createElement("div");
      label.className = "role";
      label.textContent = role === "user" ? "You" : "Assistant";
      const body = document.createElement("div");
      body.className = "body";
      body.innerHTML = role === "user" ? escapeHtml(text).replace(/\n/g, "<br>") : renderMarkdown(text);
      bubble.appendChild(label);
      bubble.appendChild(body);
      messagesEl.appendChild(bubble);
      scrollDown();
      return body;
    }

    function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function setStreaming(on) {
      streaming = on;
      sendBtn.disabled = on;
      inputEl.disabled = on;
      sendBtn.textContent = on ? "…" : "Send";
    }

    async function loadHistory() {
      try {
        const res = await fetch(`/api/history?session_id=${encodeURIComponent(SESSION_ID)}`);
        const data = await res.json();
        if (data.messages && data.messages.length) {
          messagesEl.querySelectorAll(".bubble").forEach(b => b.remove());
          data.messages.forEach(m => addBubble(m.role, m.content));
        }
      } catch (e) { /* ignore — fresh start */ }
    }

    async function loadModel() {
      try {
        const res = await fetch("/healthz");
        const data = await res.json();
        modelEl.textContent = data.model || "ready";
        dotEl.style.background = "#4caf50";
      } catch (e) {
        modelEl.textContent = "offline";
        dotEl.style.background = "#e05260";
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;
      inputEl.value = "";
      autoGrow();
      addBubble("user", text);
      setStreaming(true);

      const body = addBubble("assistant", "");
      body.parentElement.classList.add("cursor");
      let acc = "";

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: SESSION_ID }),
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const frames = buffer.split("\n\n");
          buffer = frames.pop(); // keep incomplete frame
          for (const frame of frames) {
            const line = frame.split("\n").find(l => l.startsWith("data:"));
            if (!line) continue;
            const payload = JSON.parse(line.slice(5).trim());
            if (payload.type === "token") {
              acc += payload.content;
              body.innerHTML = renderMarkdown(acc);
              scrollDown();
            } else if (payload.type === "error") {
              acc += "\n\n*" + payload.content + "*";
              body.innerHTML = renderMarkdown(acc);
            }
          }
        }
      } catch (e) {
        body.innerHTML = renderMarkdown("*Connection error: " + e.message + "*");
      } finally {
        body.parentElement.classList.remove("cursor");
        setStreaming(false);
        inputEl.focus();
      }
    }

    async function resetSession() {
      if (streaming) return;
      await fetch("/api/session/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: SESSION_ID }),
      });
      messagesEl.querySelectorAll(".bubble").forEach(b => b.remove());
      if (emptyEl) emptyEl.style.display = "";
      inputEl.focus();
    }

    function autoGrow() {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + "px";
    }

    inputEl.addEventListener("input", autoGrow);
    inputEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener("click", sendMessage);
    resetBtn.addEventListener("click", resetSession);

    loadModel();
    loadHistory();
    inputEl.focus();
  </script>
</body>
</html>
